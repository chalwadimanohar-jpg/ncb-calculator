<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NCB Calculator</title>
<style>
body{font-family:Arial;background:#f4f6f9;margin:0;padding:30px;}
.container{max-width:700px;margin:auto;background:#fff;padding:25px;
border-radius:15px;box-shadow:0 2px 15px rgba(0,0,0,0.1);}
h1{background:#1f4e78;color:#fff;padding:15px;border-radius:10px;text-align:center;}
label{font-weight:bold;display:block;margin-top:15px;}
input{width:100%;padding:10px;font-size:16px;border:1px solid #ccc;border-radius:8px;}
button{margin-top:20px;width:100%;padding:12px;background:#1f4e78;
color:white;border:none;border-radius:8px;font-size:16px;cursor:pointer;}
.card{background:#dff0d8;padding:15px;margin-top:20px;border-radius:10px;font-size:20px;}
table{width:100%;border-collapse:collapse;margin-top:20px;}
th{background:#1f4e78;color:white;padding:10px;}
td{border:1px solid #ddd;padding:10px;text-align:center;}
.current{background:#c6efce;font-weight:bold;}
</style>
</head>
<body>
<div class="container">
<h1>NCB Calculator</h1>

<label>Last Claim Date</label>
<input type="date" id="claim">

<label>Policy Due Date</label>
<input type="date" id="due">

<button onclick="calc()">Calculate NCB</button>

<div class="card" id="result">Eligible NCB : --</div>

<table id="history" style="display:none;">
<tr><th>Policy Year</th><th>NCB</th></tr>
</table>
</div>

<script>
function calc(){
let c=new Date(document.getElementById("claim").value);
let d=new Date(document.getElementById("due").value);

if(!c || !d || isNaN(c) || isNaN(d)){return;}

let renewalYear=c.getFullYear();
let dueMonth=d.getMonth();
let dueDay=d.getDate();

if((c.getMonth()>dueMonth) || (c.getMonth()==dueMonth && c.getDate()>=dueDay)){
    renewalYear +=1;
}

let step=d.getFullYear()-renewalYear;

let ncb="0%";
if(step==1) ncb="20%";
else if(step==2) ncb="25%";
else if(step==3) ncb="35%";
else if(step==4) ncb="45%";
else if(step>=5) ncb="50%";

document.getElementById("result").innerHTML="Eligible NCB : <b>"+ncb+"</b>";

let tbl=document.getElementById("history");
tbl.style.display="table";
tbl.innerHTML="<tr><th>Policy Year</th><th>NCB</th></tr>";

let vals=["0%","20%","25%","35%","45%","50%"];

for(let i=0;i<=step && i<6;i++){
 let y=renewalYear+i;
 let row=tbl.insertRow();
 if(i==step) row.className="current";
 row.insertCell(0).innerHTML=y+"-"+(y+1);
 row.insertCell(1).innerHTML=vals[i];
}
}
</script>
    <div style="
text-align:center;
margin-top:20px;
padding:10px;
font-size:14px;
color:#666;">
Created By - Manohar Chalwadi
</div>
</body>
</html>
